<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Ofertas — Luis Martinez</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#f7f6f3;--surface:#ffffff;--border:#e8e5e0;--text:#1a1917;--text2:#6b6860;--text3:#9e9b96;--blue:#1F4E79;--blue-light:#e8f0f8;--green:#2d6a2d;--green-light:#eaf3ea;--amber:#7a4f00;--red:#8b1a1a;--red-light:#fdecea;--radius:12px;--radius-sm:8px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:60px;position:sticky;top:0;z-index:100;gap:16px}
  .logo{font-size:16px;font-weight:600;color:var(--blue);letter-spacing:-.3px}
  .nav-link{font-size:14px;color:var(--text2);text-decoration:none;padding:6px 12px;border-radius:var(--radius-sm);transition:background .15s}
  .nav-link:hover{background:var(--bg);color:var(--text)}
  .nav-link.active{background:var(--blue-light);color:var(--blue);font-weight:500}
  .layout{display:grid;grid-template-columns:380px 1fr;min-height:calc(100vh - 60px)}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.5rem;overflow-y:auto}
  .main{padding:1.5rem;overflow-y:auto}
  .section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.75rem}
  .form-group{margin-bottom:1rem}
  .form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px}
  .form-group textarea,.form-group select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);transition:border-color .15s}
  .form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--blue)}
  .form-group textarea{resize:vertical}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:all .15s;width:100%}
  .btn:hover{background:var(--bg)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-primary:hover:not(:disabled){background:#185a8d}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green)}
  .btn-green:hover{background:#245924}
  .history-item{padding:.75rem;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:.5rem;cursor:pointer;transition:all .15s}
  .history-item:hover{background:var(--bg);border-color:var(--blue)}
  .history-item.active{border-color:var(--blue);background:var(--blue-light)}
  .hi-title{font-size:13px;font-weight:500;margin-bottom:2px}
  .hi-meta{font-size:12px;color:var(--text3)}
  .placeholder{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:var(--text3)}
  .placeholder-icon{font-size:40px}
  .placeholder-text{font-size:14px}
  .result-wrap{display:none}
  .result-wrap.show{display:block}
  .score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:1.5rem}
  .score-ring{width:100px;height:100px;border-radius:50%;border:6px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
  .score-num{font-size:28px;font-weight:700;line-height:1}
  .score-lbl{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase}
  .score-info{flex:1}
  .score-verdict{font-size:18px;font-weight:600;margin-bottom:6px}
  .score-desc{font-size:13px;color:var(--text2);line-height:1.6}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
  .card-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem}
  .pills{display:flex;flex-wrap:wrap;gap:6px}
  .pill{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
  .pill-green{background:var(--green-light);color:var(--green)}
  .pill-red{background:var(--red-light);color:var(--red)}
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem}
  .tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;transition:all .15s;background:none;border-left:none;border-right:none;border-top:none;font-family:'DM Sans',sans-serif}
  .tab.active{color:var(--blue);border-bottom-color:var(--blue)}
  .tab-content{display:none}
  .tab-content.active{display:block}
  .text-block{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap;background:var(--bg);border-radius:var(--radius-sm);padding:1.25rem;border:1px solid var(--border);max-height:400px;overflow-y:auto;font-family:'DM Sans',sans-serif}
  .rec{display:flex;gap:10px;padding:.75rem 0;border-bottom:1px solid var(--border)}
  .rec:last-child{border-bottom:none}
  .rec-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .dot-alta{background:var(--red)}.dot-media{background:var(--amber)}.dot-baja{background:var(--green)}
  .rec-body{flex:1}
  .rec-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .rec-detail{font-size:13px;color:var(--text2);line-height:1.5}
  .dl-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:var(--red-light);color:var(--red);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-top:.75rem;display:none;line-height:1.5}
  .divider{height:1px;background:var(--border);margin:1.25rem 0}
  .progress-bar{height:3px;background:var(--blue-light);border-radius:2px;margin-top:.75rem;overflow:hidden;display:none}
  .progress-fill{height:100%;background:var(--blue);border-radius:2px;width:0;transition:width 40s linear}
  .wake-msg{font-size:12px;color:var(--text3);margin-top:8px;display:none;text-align:center}
  @media(max-width:768px){.layout{grid-template-columns:1fr}.sidebar{border-right:none;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">Luis — Canada Career</span>
  <a href="index.html" class="nav-link">Plan de estudios</a>
  <a href="analyzer.html" class="nav-link active">Analizador de ofertas</a>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="section-title">Nueva analisis</div>
    <div class="form-group">
      <label>Perfil a usar</label>
      <select id="profileType">
        <option value="data">Data / BI Analyst</option>
        <option value="pm">Project Manager</option>
      </select>
    </div>
    <div class="form-group">
      <label>Oferta de trabajo</label>
      <textarea id="jobPosting" rows="12" placeholder="Pega aqui el texto del job posting..."></textarea>
    </div>
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">Analizar oferta</button>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="wake-msg" id="wakeMsg">Despertando el servidor... puede tardar hasta 30 segundos la primera vez.</div>
    <div class="error-box" id="errorBox"></div>
    <div class="divider"></div>
    <div class="section-title">Historial</div>
    <div id="history"><div style="font-size:13px;color:var(--text3)">Sin analisis previos</div></div>
  </div>
  <div class="main">
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">📋</div>
      <div class="placeholder-text">Pega una oferta y haz click en Analizar</div>
    </div>
    <div class="result-wrap" id="resultWrap">
      <div class="score-card">
        <div class="score-ring" id="scoreRing">
          <span class="score-num" id="scoreNum">--</span>
          <span class="score-lbl">match</span>
        </div>
        <div class="score-info">
          <div class="score-verdict" id="scoreVerdict"></div>
          <div class="score-desc" id="scoreDesc"></div>
        </div>
      </div>
      <div class="card"><div class="card-title">Skills que coinciden</div><div class="pills" id="skillsMatch"></div></div>
      <div class="card"><div class="card-title">Skills a reforzar o adquirir</div><div class="pills" id="skillsGap"></div></div>
      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('cv')">CV adaptado</button>
          <button class="tab" onclick="switchTab('cover')">Cover letter</button>
          <button class="tab" onclick="switchTab('recs')">Recomendaciones</button>
        </div>
        <div class="tab-content active" id="tab-cv">
          <div class="text-block" id="cvContent"></div>
          <div class="dl-btns">
            <button class="btn btn-green" onclick="downloadWord('cv')">Descargar CV (.docx)</button>
            <button class="btn" onclick="copyText('cvContent')">Copiar texto</button>
          </div>
        </div>
        <div class="tab-content" id="tab-cover">
          <div class="text-block" id="coverContent"></div>
          <div class="dl-btns">
            <button class="btn btn-green" onclick="downloadWord('cover')">Descargar Cover Letter (.docx)</button>
            <button class="btn" onclick="copyText('coverContent')">Copiar texto</button>
          </div>
        </div>
        <div class="tab-content" id="tab-recs"><div id="recsContent"></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const SUPABASE_URL='https://eelgwbucnrqpuhivygde.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlbGd3YnVjbnJxcHVoaXZ5Z2RlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzU2NTcsImV4cCI6MjA4OTgxMTY1N30.Bi3E9f2HZfrlohC_NP6BGNYlppusH2YJvhBfdk6dT1U';
const API_URL='https://luis-career-api.onrender.com';
const {createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
let currentResult=null;

const PROFILES={
  data:{name:"Luis Ricardo Martinez Tobalina",title:"Data Analyst | BI Analyst | Information Systems Engineer",contact:"Lima Peru | Open to relocation to Canada | Eligible under Peru-Canada FTA | luis.ricardo.martinez.94@gmail.com | linkedin.com/in/luisricardomartinezt",summary:"Data Analyst BI Specialist 9+ years consulting banking retail. ETL BI Power BI SQL Python DAX Diligent. WES Canadian equivalency Bachelor degree. IELTS 7.0 C1.",skills:["SQL","Python","ETL","Power BI","Tableau","DAX","Excel","Data Modeling","Data Governance","KPI Dashboards","Diligent ACL","Diligent Robotics","VBA","Agile","Scrum"],experience:[{t:"Data Analyst Freelance",c:"Software & Consulting",p:"Jan 2026-Present",b:["BI and automation consulting. Power BI dashboards and ETL workflows."]},{t:"Project Manager",c:"Software & Consulting",p:"Jun 2023-Dec 2025",b:["Audit automation 15+ clients. Time -40% accuracy +75%. 90% satisfaction. Trained 500+. Efficiency +30%."]},{t:"Senior BI Consultant",c:"Software & Consulting",p:"Aug 2019-Jun 2023",b:["Diligent tools adoption +20%. Support -50%. Repeat business +25%."]},{t:"Information Analyst",c:"Interbank",p:"Feb 2018-Aug 2019",b:["Reports automated -50%. Power BI dashboards +30% efficiency. ETL +40%."]},{t:"Strategic Analyst",c:"Cencosud",p:"Jun 2017-Dec 2017",b:["Reporting automation -60%. Excel macros +35%."]}],education:"Bachelor Information Systems Engineering UPC Peru | WES Bachelor degree four years ECA 6940766IMM",certs:"IELTS 7.0 C1 L8.5 R7.0 W6.0 S7.0 | Python Data Analyst 2024 | Power BI 2023 | BI Analyst DMC 2019"},
  pm:{name:"Luis Ricardo Martinez Tobalina",title:"Project Manager | Technology & Data Consulting",contact:"Lima Peru | Open to relocation to Canada | Eligible under Peru-Canada FTA | luis.ricardo.martinez.94@gmail.com | linkedin.com/in/luisricardomartinezt",summary:"Project Manager 9+ years technology data consulting. 90% satisfaction. Agile Scrum stakeholder management. WES Canadian equivalency Bachelor degree. IELTS 7.0 C1.",skills:["Project Planning","Risk Management","Agile","Scrum","Stakeholder Management","Cross-functional Leadership","Client Relations","Power BI","SQL","Python","ETL","Diligent"],experience:[{t:"PM Consultant Freelance",c:"Software & Consulting",p:"Jan 2026-Present",b:["End-to-end project management automation and BI."]},{t:"Project Manager",c:"Software & Consulting",p:"Jun 2023-Dec 2025",b:["Audit automation 15+ clients -40% time +75% accuracy. 90% satisfaction. 500+ trained. +30% efficiency."]},{t:"Senior Consultant",c:"Software & Consulting",p:"Aug 2019-Jun 2023",b:["Diligent implementations adoption +20%. Repeat business +25%."]},{t:"Information Analyst",c:"Interbank",p:"Feb 2018-Aug 2019",b:["Automation -50% manual effort. Forecast +15%."]},{t:"Strategic Analyst",c:"Cencosud",p:"Jun 2017-Dec 2017",b:["Reporting automation -60%."]}],education:"Bachelor Information Systems Engineering UPC Peru | WES Bachelor degree four years ECA 6940766IMM",certs:"IELTS 7.0 C1 | Python Data Analyst 2024 | Power BI 2023"}
};

function switchTab(t){document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',['cv','cover','recs'][i]===t));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active')}
function copyText(id){navigator.clipboard.writeText(document.getElementById(id).innerText).catch(()=>{})}
function showError(msg){const el=document.getElementById('errorBox');el.textContent=msg;el.style.display='block'}

async function analyze(){
  const job=document.getElementById('jobPosting').value.trim();
  if(job.length<30){showError('Pega el texto del job posting.');return}
  const pt=document.getElementById('profileType').value;
  const p=PROFILES[pt];
  const btn=document.getElementById('analyzeBtn');
  const bar=document.getElementById('progressBar');
  const fill=document.getElementById('progressFill');
  const wake=document.getElementById('wakeMsg');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> Analizando...';
  bar.style.display='block';
  fill.style.transition='none';
  fill.style.width='0';
  setTimeout(()=>{fill.style.transition='width 40s linear';fill.style.width='85%'},50);
  setTimeout(()=>{wake.style.display='block'},5000);
  document.getElementById('errorBox').style.display='none';

  const exp=p.experience.map(e=>`${e.t} ${e.c} ${e.p}: ${e.b.join(' ')}`).join(' | ');
  const prompt=`Canadian recruitment consultant. Analyze job fit and return ONLY valid JSON no markdown no code fences.
CANDIDATE: ${p.name} | ${p.title} | ${p.contact}
Summary: ${p.summary}
Skills: ${p.skills.join(',')}
Experience: ${exp}
Education: ${p.education} | ${p.certs}
JOB: ${job.substring(0,1200)}
JSON: {"score":85,"verdict":"short verdict","scoreDesc":"2 sentences","jobTitle":"title","company":"company","skillsMatch":["s1","s2"],"skillsGap":["g1","g2"],"adaptedCV":"full plain text CV tailored for this job","coverLetter":"cover letter mentioning Peru-Canada FTA eligibility","recommendations":[{"priority":"alta","title":"t","detail":"d"}]}`;

  try{
    const resp=await fetch(API_URL+'/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'user',content:prompt}]})
    });
    if(!resp.ok){
      const e=await resp.json().catch(()=>({}));
      throw new Error(e.error||'Error del servidor: '+resp.status);
    }
    const data=await resp.json();
    if(!data.result)throw new Error(data.error||'Respuesta inesperada');
    const result=data.result;
    await saveAnalysis(result,job,pt);
    renderResult(result);
    loadHistory();
  }catch(e){
    showError('Error: '+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML='Analizar oferta';
    wake.style.display='none';
    fill.style.transition='width 0.5s';
    fill.style.width='100%';
    setTimeout(()=>{bar.style.display='none';fill.style.width='0'},600);
  }
}

async function saveAnalysis(r,jobPosting,profileType){
  await db.from('job_analyses').insert({job_title:r.jobTitle||'Sin titulo',company:r.company||'Sin empresa',job_posting:jobPosting.substring(0,2000),profile_type:profileType,score:r.score,verdict:r.verdict,score_desc:r.scoreDesc,skills_match:r.skillsMatch,skills_gap:r.skillsGap,adapted_cv:r.adaptedCV,cover_letter:r.coverLetter,recommendations:r.recommendations});
}

function renderResult(r){
  currentResult=r;
  const score=Math.min(100,Math.max(0,Math.round(r.score)));
  const color=score>=75?'#2d6a2d':score>=55?'#7a4f00':'#8b1a1a';
  document.getElementById('scoreRing').style.borderColor=color;
  document.getElementById('scoreNum').textContent=score+'%';
  document.getElementById('scoreNum').style.color=color;
  document.getElementById('scoreVerdict').textContent=r.verdict||'';
  document.getElementById('scoreDesc').textContent=r.scoreDesc||'';
  document.getElementById('skillsMatch').innerHTML=(r.skillsMatch||[]).map(s=>`<span class="pill pill-green">${s}</span>`).join('');
  document.getElementById('skillsGap').innerHTML=(r.skillsGap||[]).length?(r.skillsGap).map(s=>`<span class="pill pill-red">${s}</span>`).join(''):'<span class="pill pill-green">Sin brechas criticas</span>';
  document.getElementById('cvContent').textContent=r.adaptedCV||'';
  document.getElementById('coverContent').textContent=r.coverLetter||'';
  document.getElementById('recsContent').innerHTML=(r.recommendations||[]).map(rec=>`<div class="rec"><div class="rec-dot dot-${rec.priority||'media'}"></div><div class="rec-body"><div class="rec-title">${rec.title}</div><div class="rec-detail">${rec.detail}</div></div></div>`).join('');
  document.getElementById('placeholder').style.display='none';
  document.getElementById('resultWrap').classList.add('show');
  switchTab('cv');
}

async function loadHistory(){
  const{data}=await db.from('job_analyses').select('*').order('created_at',{ascending:false}).limit(20);
  if(!data||!data.length)return;
  document.getElementById('history').innerHTML=data.map(row=>`<div class="history-item" onclick="loadAnalysis('${row.id}')"><div class="hi-title">${row.job_title} - ${row.company}</div><div class="hi-meta">${row.score}% match · ${new Date(row.created_at).toLocaleDateString('es-PE')}</div></div>`).join('');
}

async function loadAnalysis(id){
  const{data}=await db.from('job_analyses').select('*').eq('id',id).single();
  if(!data)return;
  document.getElementById('jobPosting').value=data.job_posting;
  document.getElementById('profileType').value=data.profile_type;
  renderResult({score:data.score,verdict:data.verdict,scoreDesc:data.score_desc,skillsMatch:data.skills_match,skillsGap:data.skills_gap,adaptedCV:data.adapted_cv,coverLetter:data.cover_letter,recommendations:data.recommendations});
}

async function downloadWord(type){
  if(!currentResult)return;
  const{Document,Packer,Paragraph,TextRun,AlignmentType,LevelFormat,BorderStyle}=docx;
  const text=type==='cv'?currentResult.adaptedCV:currentResult.coverLetter;
  const filename=type==='cv'?'CV_Luis_Martinez_Canada.docx':'CoverLetter_Luis_Martinez.docx';
  const lines=text.split('\n');
  const children=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const isHeader=line===line.toUpperCase()&&line.trim().length>3&&!/^\s/.test(line)&&line.trim()!=='';
    const isBullet=/^[*\-•]/.test(line.trim());
    if(isHeader){children.push(new Paragraph({spacing:{before:200,after:60},border:{bottom:{style:BorderStyle.SINGLE,size:6,color:'1F4E79',space:4}},children:[new TextRun({text:line.trim(),bold:true,size:22,color:'1F4E79',font:'Calibri'})]}))}
    else if(isBullet){children.push(new Paragraph({numbering:{reference:'bullets',level:0},spacing:{before:40,after:40},children:[new TextRun({text:line.replace(/^[*\-•]\s*/,'').trim(),size:20,font:'Calibri'})]}))}
    else if(line.trim()===''){children.push(new Paragraph({spacing:{before:40,after:40},children:[new TextRun('')]}))}
    else{const bold=i===0||(i<5&&line.includes('|'));children.push(new Paragraph({spacing:{before:40,after:40},children:[new TextRun({text:line,bold:bold,size:bold&&i===0?28:20,font:'Calibri',color:bold&&i===0?'1F4E79':'000000'})]}))}
  }
  const doc=new Document({
    numbering:{config:[{reference:'bullets',levels:[{level:0,format:LevelFormat.BULLET,text:'•',alignment:AlignmentType.LEFT,style:{paragraph:{indent:{left:360,hanging:200}}}}]}]},
    sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:900,right:1080,bottom:900,left:1080}}},children}]
  });
  const buffer=await Packer.toBuffer(doc);
  const blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}

loadHistory();
</script>
</body>
</html>
